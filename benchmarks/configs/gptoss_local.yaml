# GPT-OSS 120B — локально через Ollama
# OpenAI-совместимый endpoint

model:
  provider: "ollama"
  model: "gpt-oss:120b"
  endpoint: "http://localhost:11434/v1"
  api_key: "ollama"  # Ollama не требует ключа

runtime:
  type: "local"
  quantization: "Q4_K_M"  # стандартный Ollama quant

inference:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 2048
  seed: 42
  timeout_seconds: 120

context:
  size: 32768  # стандартный Ollama context

benchmark:
  repeats: 1
  modes: [raw, compressed]
